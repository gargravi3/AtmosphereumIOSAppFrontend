name: Atmosm
options:
  bundleIdPrefix: com.atmosm
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Atmosm:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Atmosm
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Debug convenience: permit HTTP to localhost/LAN so the Simulator can
        # talk to a dev Vapor server. Replace with the Render.com HTTPS URL in
        # release builds (set API_BASE_URL below, or edit at build time).
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        API_BASE_URL: "https://atmosm-backend.onrender.com"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.atmosm.Atmosm
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
